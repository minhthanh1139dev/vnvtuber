version: '3.8'

services:
  # 1. Official Redis service
  redis:
    image: redis:7-alpine
    container_name: vnvtuber-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vnvtuber-network

  # 2. Official MongoDB service
  mongodb:
    image: mongo:6-jammy
    container_name: vnvtuber-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - vnvtuber-network

  # 3. Our NodeJS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vnvtuber-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - mongodb
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/vnvtuber
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - vnvtuber-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  vnvtuber-network:
    driver: bridge
