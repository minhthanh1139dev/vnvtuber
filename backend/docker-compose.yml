# VNVtuber backend — 3 processes from src/bin + infra
# Usage:
#   cp .env.example .env   # fill BASE_URL (HTTPS), JWT_SECRET, YOUTUBE_API_KEYS
#   docker compose up -d --build
#
# Processes:
#   api        → src/bin/api/api.js
#   worker     → src/bin/worker/worker.js
#   scheduler  → src/bin/scheduler/scheduler.js

name: vnvtuber

x-app-common: &app-common
  image: ${DOCKER_IMAGE:-vnvtuber-backend:local}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  networks:
    - vnvtuber-network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-app-env: &app-env
  NODE_ENV: production
  PORT: "3000"
  MONGO_URL: mongodb://mongodb:27017
  MONGO_DATABASE: vnvtuber
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  TRUST_PROXY: "true"

x-app-depends: &app-depends
  mongodb:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  mongodb:
    image: mongo:7-jammy
    container_name: vnvtuber-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - vnvtuber-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: vnvtuber-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - vnvtuber-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 5s

  api:
    <<: *app-common
    container_name: vnvtuber-api
    command: ["dumb-init", "node", "src/bin/api/api.js"]
    environment:
      <<: *app-env
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      <<: *app-depends
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s

  worker:
    <<: *app-common
    container_name: vnvtuber-worker
    command: ["dumb-init", "node", "src/bin/worker/worker.js"]
    environment:
      <<: *app-env
    depends_on:
      <<: *app-depends
      api:
        condition: service_healthy

  scheduler:
    <<: *app-common
    container_name: vnvtuber-scheduler
    command: ["dumb-init", "node", "src/bin/scheduler/scheduler.js"]
    environment:
      <<: *app-env
    depends_on:
      <<: *app-depends
      api:
        condition: service_healthy

volumes:
  mongodb_data:
  redis_data:

networks:
  vnvtuber-network:
    driver: bridge
